<!DOCTYPE html>
<html>
<head>
    <title>AssistIQ</title>

    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #0d6efd;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .status {
            margin-top: 10px;
            color: lightgreen;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 20px;
            background: #f4f6f9;
        }

        .tickets {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .ticket {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }

        .ticket:last-child {
            border-bottom: none;
        }

        /* Chat style */
        df-messenger {
            --df-messenger-button-titlebar-color: #0d6efd;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>AssistIQ</h2>
        <p>User: Nila</p>
        <p class="status">● Online</p>
    </div>

    <!-- Main -->
    <div class="main">

        <h2>My Tickets</h2>

        <div class="tickets" id="ticketList">
            Loading tickets...
        </div>

    </div>

    <!-- Chatbot -->
    <df-messenger
        intent="WELCOME"
        chat-title="AssistIQ"
        agent-id="442500e9-80d0-4178-a68d-86463fc42db7"
        language-code="en">
    </df-messenger>

    <script>
        async function loadTickets() {
            let res = await fetch('/tickets');
            let data = await res.json();

            let container = document.getElementById("ticketList");

            if (data.length === 0) {
                container.innerHTML = "No tickets yet";
                return;
            }

            container.innerHTML = "";

            data.forEach(t => {
                container.innerHTML += `
                    <div class="ticket">
                        <b>${t.id}</b><br>
                        Type: ${t.type}<br>
                        Status: ${t.status}
                    </div>
                `;
            });
        }

        // Auto refresh tickets every 3 sec
        setInterval(loadTickets, 3000);
        loadTickets();
    </script>

</body>
</html>
