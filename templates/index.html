<!DOCTYPE html>
<html>
<head>
    <title>AssistIQ</title>

    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;

            background: linear-gradient(135deg, #0f0f0f, #1a1a1a, #2b2b2b);
            color: white;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            padding: 20px;

            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        /* User section */
        .user {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .avatar {
            background: #4da6ff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome {
            margin: 0;
            font-size: 14px;
        }

        .status {
            margin: 0;
            font-size: 12px;
            color: #00ff9d;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 20px;
        }

        .main h2 {
            margin-bottom: 15px;
        }

        /* Ticket container */
        .tickets {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 15px;
        }

        /* Ticket cards */
        .ticket {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .ticket:hover {
            background: rgba(255,255,255,0.15);
        }

        .ticket-id {
            font-weight: bold;
            color: #4da6ff;
        }

        .ticket-type {
            color: #ccc;
            font-size: 14px;
        }

        .ticket-status {
            color: #00ff9d;
            font-size: 13px;
        }

        /* Chatbot theme */
        df-messenger {
            --df-messenger-button-titlebar-color: #4da6ff;
            --df-messenger-chat-background-color: #1a1a1a;
            --df-messenger-user-message: #4da6ff;
            --df-messenger-font-color: white;
        }

        /* Chat icon */
        df-messenger::part(chat-button) {
            background-image: url("https://cdn-icons-png.flaticon.com/512/4712/4712027.png");
            background-size: cover;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>AssistIQ</h2>

        <div class="user">
            <div class="avatar">👤</div>
            <div>
                <p class="welcome">Welcome</p>
                <p class="status">● Online</p>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">

        <h2>Support Tickets</h2>

        <div class="tickets" id="ticketList">
            Loading tickets...
        </div>

    </div>

    <!-- Chatbot -->
    <df-messenger
        intent="WELCOME"
        chat-title="AssistIQ"
        agent-id="442500e9-80d0-4178-a68d-86463fc42db7"
        language-code="en">
    </df-messenger>

    <script>
        async function loadTickets() {
            let res = await fetch('/tickets');
            let data = await res.json();

            let container = document.getElementById("ticketList");

            if (data.length === 0) {
                container.innerHTML = "No active tickets. You're all good 👍";
                return;
            }

            container.innerHTML = "";

            data.forEach(t => {
                container.innerHTML += `
                    <div class="ticket">
                        <div class="ticket-id">${t.id}</div>
                        <div class="ticket-type">${t.type}</div>
                        <div class="ticket-status">${t.status}</div>
                    </div>
                `;
            });
        }

        setInterval(loadTickets, 3000);
        loadTickets();
    </script>

</body>
</html>
