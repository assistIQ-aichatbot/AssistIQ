<!DOCTYPE html>
<html>
<head>
    <title>AssistIQ Chatbot</title>

    <!-- Dialogflow Messenger Script -->
    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <h1>AssistIQ – AI Chatbot</h1>
    <p>Your intelligent service desk assistant</p>

    <!-- Dialogflow Messenger -->
    <df-messenger
        intent="WELCOME"
        chat-title="AssistIQ"
        agent-id="442500e9-80d0-4178-a68d-86463fc42db7"
        language-code="en">
    </df-messenger>
    <style>
df-messenger {
  --df-messenger-bot-message: #e6f0ff;
  --df-messenger-button-titlebar-color: #0d6efd;
  --df-messenger-chat-background-color: #f5f5f5;
  --df-messenger-send-icon: #0d6efd;
}

/* 🔹 Change chat icon */
df-messenger::part(chat-button) {
  background-image: url("https://cdn-icons-png.flaticon.com/512/4712/4712027.png");
  background-size: cover;
}
</style>

</body>
</html>
